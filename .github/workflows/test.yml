name: Build and Test

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/test.yml"
      - "**/*.rs"
      - "**/*.kt"
      - "**/Cargo.toml"
      - "**/build.gradle.kts"
      - "android/**"
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/test.yml"
      - "**/*.rs"
      - "**/*.kt"
      - "**/Cargo.toml"
      - "**/build.gradle.kts"
      - "android/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust-fmt:
    runs-on: ubuntu-latest
    name: Rust Format Check

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  rust-clippy:
    runs-on: ubuntu-latest
    name: Rust Clippy Lint

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Install webkit2gtk
        run: |
          sudo apt-get update
          sudo apt-get install -y webkit2gtk-4.1
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-targets --all-features -- -D warnings

  android-build-test:
    runs-on: ubuntu-latest
    name: Android Build and Test
    needs: [rust-fmt, rust-clippy]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install webkit2gtk
        run: |
          sudo apt-get update
          sudo apt-get install -y webkit2gtk-4.1

      - name: Build Rust Library
        run: cargo build --lib

      - name: Create tauri-api directory
        run: |
          mkdir -p android/.tauri/tauri-api
          cat > android/.tauri/tauri-api/build.gradle.kts << 'EOF'
          plugins {
              id("com.android.library")
          }

          android {
              namespace = "com.tauri.android"
              compileSdk = 36

              defaultConfig {
                  minSdk = 21
              }

              buildTypes {
                  release {
                      isMinifyEnabled = false
                  }
              }
          }
          EOF

      - name: Build Android Library
        run: cd android && gradle build -x test

      - name: Run Android Tests
        run: cd android && gradle test
